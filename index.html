<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header border-bottom">
      <div class="container-fluid px-4 px-lg-5">
        <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-4">
          <div>
            <h1 class="fw-bold mb-2">Expense Tracker</h1>
            <p class="month-label mb-0">June 2026</p>
          </div>
          <button
            class="btn btn-brand btn-lg fw-bold"
            id="openTransactionModal"
            type="button"
            data-bs-toggle="modal"
            data-bs-target="#transactionModal"
          >
            <span class="button-icon" aria-hidden="true">+</span>
            Add Transaction
          </button>
        </div>
      </div>
    </header>

    <main class="container-fluid px-4 px-lg-5 py-4 py-lg-5">
      <section class="row g-4 mb-4 mb-lg-5" aria-label="Account summary">
        <div class="col-12 col-lg-4">
          <article class="card summary-card h-100">
            <div class="card-body d-flex align-items-start justify-content-between p-4 p-xl-5">
              <div>
                <p class="summary-label mb-4">Balance</p>
                <strong id="balanceTotal" class="summary-value">₹0.00</strong>
              </div>
              <span class="summary-symbol">₹</span>
            </div>
          </article>
        </div>

        <div class="col-12 col-lg-4">
          <article class="card summary-card h-100">
            <div class="card-body d-flex align-items-start justify-content-between p-4 p-xl-5">
              <div>
                <p class="summary-label mb-4">Total Income</p>
                <strong id="incomeTotal" class="summary-value text-income">₹0.00</strong>
              </div>
              <span class="summary-symbol text-income">↗</span>
            </div>
          </article>
        </div>

        <div class="col-12 col-lg-4">
          <article class="card summary-card h-100">
            <div class="card-body d-flex align-items-start justify-content-between p-4 p-xl-5">
              <div>
                <p class="summary-label mb-4">Total Expenses</p>
                <strong id="expenseTotal" class="summary-value text-expense">₹0.00</strong>
              </div>
              <span class="summary-symbol text-expense">↘</span>
            </div>
          </article>
        </div>
      </section>

      <section class="row g-4 g-xl-5">
        <div class="col-12 col-xl-5">
          <article class="card panel-card h-100">
            <div class="card-body p-4 p-xl-5">
              <h2 class="panel-title fw-bold mb-4">Spending by Category</h2>
              <div class="donut-wrap">
                <div class="donut-chart" id="donutChart" aria-label="Spending by category chart"></div>
              </div>
              <div class="category-list" id="categoryList"></div>
            </div>
          </article>
        </div>

        <div class="col-12 col-xl-7">
          <article class="card panel-card h-100 overflow-hidden">
            <div class="card-body p-4 p-xl-5 border-bottom">
              <h2 class="panel-title fw-bold mb-4">Transactions</h2>
              <div class="row g-3">
                <div class="col-12 col-md-auto">
                  <label class="visually-hidden" for="categoryFilter">Category</label>
                  <select class="form-select form-select-lg filter-select" id="categoryFilter">
                    <option value="all">All Categories</option>
                  </select>
                </div>
                <div class="col-12 col-md-auto">
                  <label class="visually-hidden" for="typeFilter">Type</label>
                  <select class="form-select form-select-lg filter-select" id="typeFilter">
                    <option value="all">All Types</option>
                    <option value="expense">Expenses</option>
                    <option value="income">Income</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="transactions" id="transactionList"></div>
          </article>
        </div>
      </section>
    </main>

    <div class="modal fade" id="transactionModal" tabindex="-1" aria-labelledby="transactionModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <form class="modal-content transaction-form" id="transactionForm">
          <div class="modal-header border-0 pb-0">
            <h2 class="modal-title fw-bold" id="transactionModalLabel">Add Transaction</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body d-grid gap-3">
            <div>
              <label class="form-label fw-bold" for="descriptionInput">Description</label>
              <input
                class="form-control form-control-lg"
                id="descriptionInput"
                type="text"
                placeholder="Coffee, salary, metro pass..."
                required
              />
            </div>

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label fw-bold" for="amountInput">Amount</label>
                <input class="form-control form-control-lg" id="amountInput" type="number" min="1" step="0.01" placeholder="0.00" required />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-bold" for="typeInput">Type</label>
                <select class="form-select form-select-lg" id="typeInput">
                  <option value="expense">Expense</option>
                  <option value="income">Income</option>
                </select>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label fw-bold" for="categoryInput">Category</label>
                <select class="form-select form-select-lg" id="categoryInput"></select>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-bold" for="dateInput">Date</label>
                <input class="form-control form-control-lg" id="dateInput" type="date" required />
              </div>
            </div>
          </div>

          <div class="modal-footer border-0 pt-0">
            <button class="btn btn-brand btn-lg w-100 fw-bold" type="submit">Save Transaction</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
